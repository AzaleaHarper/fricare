name: Publish to Play Store

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Release track"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.0"
          channel: stable

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
          echo "$KEY_PROPERTIES" > android/key.properties

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Decode Play Store service account
        env:
          PLAY_STORE_CREDENTIALS: ${{ secrets.PLAY_STORE_CREDENTIALS }}
        run: echo "$PLAY_STORE_CREDENTIALS" > play-store-credentials.json

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: play-store-credentials.json
          packageName: com.fricare.fricare
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}

      - name: Cleanup credentials
        if: always()
        run: rm -f play-store-credentials.json android/key.properties
